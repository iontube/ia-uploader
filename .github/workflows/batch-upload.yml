name: Batch IA stub items (no PDFs)
on:
  workflow_dispatch:
    inputs:
      items_per_run:
        description: "Items per account per run"
        required: true
        default: "50"
  # Non-stop: every 15 min × 6 accts × 30 items = 180 items/run = ~17000/day
  schedule:
    - cron: "*/15 * * * *"

# Allow parallel runs — each gets unique concurrency group via run_id.
# Concurrent runs hit same 6 accounts; 0.8s sleep per upload keeps per-account QPS low.
concurrency:
  group: ia-batch-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  upload:
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        idx: [0, 1, 2, 3, 4, 5]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: (no extra deps — pure stdlib worker)
        run: echo "stub-items worker uses only urllib"

      - name: Resolve account + group from matrix idx
        id: acct
        env:
          IDX: ${{ matrix.idx }}
        run: |
          # Group cycle per matrix slot. Named GROUP_CYCLE because $GROUPS is a bash builtin (user GIDs).
          GROUP_CYCLE=(desi auntymaza xnxx india hindibf desi)
          echo "GROUP=${GROUP_CYCLE[$IDX]}" >> $GITHUB_ENV
          LABELS=(acct1 acct2 acct3 acct4 acct5 acct6)
          echo "ACCOUNT_LABEL=${LABELS[$IDX]}" >> $GITHUB_ENV

      - name: Pick IA credentials by index
        id: creds
        env:
          IDX: ${{ matrix.idx }}
          IA_ACCESS_1: ${{ secrets.IA_ACCESS_1 }}
          IA_SECRET_1: ${{ secrets.IA_SECRET_1 }}
          IA_ACCESS_2: ${{ secrets.IA_ACCESS_2 }}
          IA_SECRET_2: ${{ secrets.IA_SECRET_2 }}
          IA_ACCESS_3: ${{ secrets.IA_ACCESS_3 }}
          IA_SECRET_3: ${{ secrets.IA_SECRET_3 }}
          IA_ACCESS_4: ${{ secrets.IA_ACCESS_4 }}
          IA_SECRET_4: ${{ secrets.IA_SECRET_4 }}
          IA_ACCESS_5: ${{ secrets.IA_ACCESS_5 }}
          IA_SECRET_5: ${{ secrets.IA_SECRET_5 }}
          IA_ACCESS_6: ${{ secrets.IA_ACCESS_6 }}
          IA_SECRET_6: ${{ secrets.IA_SECRET_6 }}
        run: |
          N=$((IDX+1))
          eval "ACC=\$IA_ACCESS_$N"
          eval "SEC=\$IA_SECRET_$N"
          if [ -z "$ACC" ] || [ -z "$SEC" ]; then
            echo "Missing IA_ACCESS_$N or IA_SECRET_$N — skipping" >&2
            exit 78  # neutral status (skipped)
          fi
          # Mask in logs
          echo "::add-mask::$ACC"
          echo "::add-mask::$SEC"
          # Write to env file (avoid logging via output)
          {
            echo "IA_ACCESS<<EOF"
            echo "$ACC"
            echo "EOF"
            echo "IA_SECRET<<EOF"
            echo "$SEC"
            echo "EOF"
          } >> $GITHUB_ENV

      - name: Run worker
        env:
          ITEMS_PER_RUN: ${{ inputs.items_per_run || '50' }}
          MATRIX_IDX: ${{ matrix.idx }}
        run: |
          mkdir -p /tmp/results
          GROUP="$GROUP" \
            ACCOUNT_LABEL="$ACCOUNT_LABEL" \
            python3 worker.py || true
          if [ -f /tmp/result.json ]; then
            cp /tmp/result.json "/tmp/results/idx${MATRIX_IDX}.json"
          fi

      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-idx-${{ matrix.idx }}
          path: /tmp/results/
          if-no-files-found: ignore
          retention-days: 7

  commit-state:
    needs: upload
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all_results

      - name: Merge results into state.json
        run: python3 merge_state.py /tmp/all_results state.json

      - name: Commit state.json (with rebase-retry for parallel runs)
        run: |
          git config user.name  "iontube-bot"
          git config user.email "iontube@noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "no state changes"
            exit 0
          fi
          git commit -m "state: after batch run $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry up to 6 times on push reject (parallel commit-state jobs race)
          for i in 1 2 3 4 5 6; do
            if git push; then
              echo "push ok on attempt $i"
              exit 0
            fi
            echo "push rejected, attempt $i — rebase + re-merge state and retry..."
            git fetch origin main
            # Rebase current commit onto fetched main, then re-apply our state changes
            # by re-running the merge step.
            git reset --hard origin/main
            python3 << 'PY'
          import json, os, glob, time
          state = json.load(open('state.json')) if os.path.exists('state.json') else {
            'used_tags': [], 'run_count': 0, 'items': [], 'acct_stats': {}
          }
          merged = 0
          for f in sorted(glob.glob('/tmp/all_results/**/*.json', recursive=True)):
              try: r = json.load(open(f))
              except: continue
              if not r.get('ok'): continue
              state['used_tags'].extend(r.get('tags_used', []))
              state['items'].append({
                  'id': r['item_id'], 'group': r['group'],
                  'pdfs': r['ok'], 'uploaded': r['ok'],
                  'ts': time.strftime('%Y-%m-%dT%H:%M:%S'),
                  'per_acct': r.get('per_acct', {}),
                  'details_url': r.get('details_url'),
              })
              for lbl, s in r.get('per_acct', {}).items():
                  agg = state.setdefault('acct_stats', {}).setdefault(lbl, {'ok': 0, 'fail': 0})
                  agg['ok']   += s.get('ok', 0)
                  agg['fail'] += s.get('fail', 0)
              merged += 1
          state['used_tags'] = list(dict.fromkeys(state['used_tags']))[-100000:]
          state['items']     = state['items'][-3000:]
          state['run_count'] = state.get('run_count', 0) + 1
          state['last_run']  = time.strftime('%Y-%m-%d %H:%M:%S')
          json.dump(state, open('state.json', 'w'), indent=2)
          print(f're-merged {merged} results after rebase')
          PY
            git add state.json
            git commit -m "state: after batch run $(date -u +%Y-%m-%dT%H:%M:%SZ) (retry $i)"
            sleep $((i * 5))
          done
          echo "FAILED to push after 6 attempts"
          exit 1
