name: dump-pool (one-shot extractor)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Decode pool + filter banned + write JSON
        env:
          POOL_CHUNKS: ${{ secrets.IA_POOL_CHUNKS }}
          POOL_B64_1:  ${{ secrets.IA_POOL_B64_1 }}
          POOL_B64_2:  ${{ secrets.IA_POOL_B64_2 }}
          POOL_B64_3:  ${{ secrets.IA_POOL_B64_3 }}
          POOL_B64_4:  ${{ secrets.IA_POOL_B64_4 }}
          POOL_B64_5:  ${{ secrets.IA_POOL_B64_5 }}
          POOL_B64_6:  ${{ secrets.IA_POOL_B64_6 }}
        run: |
          python3 <<'PY'
          import os, base64, gzip, json
          chunks_n = int(os.environ.get('POOL_CHUNKS') or '0')
          parts = ''.join(os.environ.get(f'POOL_B64_{i}','') for i in range(1, chunks_n+1))
          pool = json.loads(gzip.decompress(base64.b64decode(parts)))
          banned = set()
          if os.path.exists('etree/banned.json'):
              try: banned = set(json.load(open('etree/banned.json')))
              except: pass
          active = [pool[i] for i in range(len(pool)) if i not in banned]
          os.makedirs('out', exist_ok=True)
          with open('out/pool_active.json','w') as f:
              json.dump(active, f)
          with open('out/pool_full.json','w') as f:
              json.dump({'pool': pool, 'banned': sorted(banned)}, f)
          print(f'pool_total={len(pool)}  banned={len(banned)}  active={len(active)}')
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: pool-dump
          path: out/
          retention-days: 1
